name: spacetimedb
description: "Dart SDK for SpacetimeDB. Real-time sync, BSATN codec, code generation, and offline-first support."
version: 0.1.0
repository: https://github.com/mitsh/spacetimedb-dart
issue_tracker: https://github.com/mitsh/spacetimedb-dart/issues

topics:
  - spacetimedb
  - database
  - realtime
  - websocket
  - codegen

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.3
  brotli: ^0.5.0
  http: ^1.6.0
  fixnum: ^1.1.1
  uuid: ^4.5.2
  meta: ^1.17.0
  args: ^2.7.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.28.0

executables:
  generate:
