name: spacetimedb
description: "Dart SDK for SpacetimeDB. Real-time sync, BSATN codec, code generation, and offline-first support."
version: 0.1.0
homepage: https://spacetimedb.com
repository: https://github.com/mitsh/spacetimedb-dart
issue_tracker: https://github.com/mitsh/spacetimedb-dart/issues
documentation: https://github.com/mitsh/spacetimedb-dart#readme

topics:
  - spacetimedb
  - database
  - realtime
  - websocket
  - codegen

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  web_socket_channel: ^3.0.3
  brotli: ^0.6.0
  http: ^1.6.0
  fixnum: ^1.1.1
  uuid: ^4.5.2
  meta: ^1.17.0
  args: ^2.7.0
  path: ^1.9.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.28.0

executables:
  generate:
